name: ms-mbintangprayogautama-betest

services:
  mongo:
    image: mongo:7
    container_name: mongo_mbintangprayogautama_betest
    environment:
      MONGO_INITDB_DATABASE: db_mbintangprayogautama_betest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ms-mbintangprayogautama-betest_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis_mbintangprayogautama_betest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ms-mbintangprayogautama-betest_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service_mbintangprayogautama_betest
    env_file:
      - auth-service/.env
    ports:
      - "50051:50051"
      - "3001:3001"
    networks:
      - ms-mbintangprayogautama-betest_net
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service_mbintangprayogautama_betest
    env_file:
      - user-service/.env
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - ms-mbintangprayogautama-betest_net
    restart: unless-stopped

networks:
  ms-mbintangprayogautama-betest_net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
